<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>cuteky</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap');

  :root{
    --cream:#FFF7F3;
    --pink:#FFD6E4;
    --bubble:#FF9EC4;
    --lav:#C9AEEA;
    --mauve:#6B4A5A;
    --mint:#BDEBD6;
    --butter:#FFE9A8;
    --coral:#FF9F8F;
    --shadow: rgba(107,74,90,0.18);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 20%, #FFE3EE 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, #E3D8FA 0%, transparent 45%),
      var(--cream);
    font-family:'Quicksand', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:var(--mauve);
  }

  .card{
    position:relative;
    width:100%;
    max-width:460px;
    background:#FFFDFB;
    border-radius:32px;
    border:3px dashed var(--pink);
    padding:28px 26px 32px;
    box-shadow: 0 18px 40px var(--shadow);
    text-align:center;
    overflow:visible;
  }

  .brand{
    font-family:'Baloo 2', cursive;
    font-size:2.1rem;
    font-weight:800;
    color:var(--bubble);
    letter-spacing:1px;
    margin:0 0 2px;
    text-shadow: 2px 2px 0 var(--pink);
  }

  .tagline{
    font-size:0.85rem;
    font-weight:600;
    color:var(--mauve);
    opacity:0.75;
    margin:0 0 6px;
  }

  /* couple doodle */
  .couple-wrap{
    margin: 6px auto 4px;
    width:170px;
  }
  .banner-text{
    font-family:'Baloo 2', cursive;
    font-size:0.72rem;
    font-weight:700;
    fill:var(--mauve);
  }

  /* doll watcher, pinned to top-right of card, peeking in */
  .doll-wrap{
    position:absolute;
    top:-18px;
    right:-22px;
    width:104px;
    filter: drop-shadow(0 6px 10px rgba(107,74,90,0.15));
    animation: sway 4.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes sway{
    0%,100%{ transform: rotate(-2deg); }
    50%{ transform: rotate(2deg); }
  }

  .thought-text{
    font-family:'Baloo 2', cursive;
    font-size:6.3px;
    font-weight:700;
    fill:var(--mauve);
  }

  .timer-display{
    font-family:'Baloo 2', cursive;
    font-size:3rem;
    font-weight:700;
    color:var(--mauve);
    background: var(--pink);
    border-radius:20px;
    padding:14px 10px;
    margin:14px 0 6px;
    letter-spacing:2px;
    box-shadow: inset 0 0 0 3px #fff, 0 4px 0 var(--bubble);
  }

  .status-pill{
    display:inline-block;
    font-size:0.72rem;
    font-weight:700;
    padding:4px 14px;
    border-radius:999px;
    background:var(--lav);
    color:#fff;
    margin-bottom:14px;
    letter-spacing:0.5px;
  }

  .controls{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:6px;
  }

  button{
    font-family:'Baloo 2', cursive;
    font-size:0.95rem;
    font-weight:700;
    border:none;
    border-radius:999px;
    padding:11px 22px;
    cursor:pointer;
    color:#fff;
    transition: transform 0.15s ease, filter 0.15s ease;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  button:active{ transform: translateY(3px); box-shadow:none; }
  button:hover{ filter:brightness(1.06); }

  .btn-start{ background: linear-gradient(180deg, #8FE0B8, #63C793); }
  .btn-pause{ background: linear-gradient(180deg, #FFD98A, #FFC155); }
  .btn-resume{ background: linear-gradient(180deg, #9FD3FF, #6CB4F5); }
  .btn-stop{ background: linear-gradient(180deg, #FF9DAE, #F26C87); }
  .btn-reset{ background: linear-gradient(180deg, #D6BEF7, #B58CEF); }

  .message-box{
    margin-top:18px;
    min-height:20px;
    font-family:'Baloo 2', cursive;
    font-size:1.05rem;
    font-weight:700;
    color:var(--mauve);
    opacity:0;
    transform:translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .message-box.show{
    opacity:1;
    transform:translateY(0);
  }

  .message-box .sub{
    display:block;
    font-family:'Quicksand', sans-serif;
    font-size:0.78rem;
    font-weight:600;
    opacity:0.7;
    margin-top:3px;
  }

  .footer-heart{
    margin-top:16px;
    font-size:0.7rem;
    opacity:0.5;
    font-weight:600;
  }

  @media (prefers-reduced-motion: reduce){
    .doll-wrap{ animation:none; }
  }

  /* pause popup */
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(107,74,90,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease;
    z-index:50;
    padding:20px;
  }
  .overlay.show{
    opacity:1;
    pointer-events:all;
  }
  .popup{
    background:#FFFDFB;
    border-radius:26px;
    border:3px dashed var(--coral);
    padding:20px 22px 22px;
    max-width:280px;
    text-align:center;
    box-shadow:0 18px 40px var(--shadow);
    transform:translateY(10px) scale(0.95);
    transition:transform 0.25s ease;
  }
  .overlay.show .popup{
    transform:translateY(0) scale(1);
  }
  .popup svg{
    width:110px;
    animation: shake 0.5s ease-in-out;
  }
  @keyframes shake{
    0%,100%{ transform:rotate(0deg); }
    20%{ transform:rotate(-4deg); }
    40%{ transform:rotate(4deg); }
    60%{ transform:rotate(-3deg); }
    80%{ transform:rotate(3deg); }
  }
  .popup-title{
    font-family:'Baloo 2', cursive;
    font-size:1.15rem;
    font-weight:800;
    color:var(--coral);
    margin:8px 0 2px;
  }
  .popup-sub{
    font-family:'Quicksand', sans-serif;
    font-size:0.8rem;
    font-weight:600;
    color:var(--mauve);
    opacity:0.8;
    margin:0 0 14px;
  }
  .btn-popup{
    background: linear-gradient(180deg, #FF9DAE, #F26C87);
  }
  @media (prefers-reduced-motion: reduce){
    .popup svg{ animation:none; }
  }

  /* login gate */
  .login-card{
    width:100%;
    max-width:340px;
    background:#FFFDFB;
    border-radius:32px;
    border:3px dashed var(--pink);
    padding:32px 26px;
    text-align:center;
    box-shadow: 0 18px 40px var(--shadow);
  }
  .login-card svg{
    width:90px;
    margin-bottom:6px;
  }
  .login-title{
    font-family:'Baloo 2', cursive;
    font-size:1.7rem;
    font-weight:800;
    color:var(--bubble);
    margin:4px 0 2px;
    text-shadow: 1.5px 1.5px 0 var(--pink);
  }
  .login-sub{
    font-size:0.82rem;
    font-weight:600;
    opacity:0.75;
    margin:0 0 20px;
  }
  .field{
    text-align:left;
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-family:'Baloo 2', cursive;
    font-size:0.78rem;
    font-weight:700;
    color:var(--mauve);
    margin-bottom:4px;
    padding-left:4px;
  }
  .field input{
    width:100%;
    font-family:'Quicksand', sans-serif;
    font-size:0.9rem;
    font-weight:600;
    color:var(--mauve);
    background:var(--cream);
    border:2px solid var(--pink);
    border-radius:14px;
    padding:10px 14px;
    outline:none;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .field input:focus{
    border-color:var(--bubble);
  }
  .login-card.shake .field input{
    animation: loginshake 0.4s ease;
  }
  @keyframes loginshake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }
  .btn-login{
    width:100%;
    margin-top:6px;
    background: linear-gradient(180deg, #FF9DAE, #F26C87);
    padding:12px;
    font-size:1rem;
  }
  .login-error{
    min-height:16px;
    font-size:0.78rem;
    font-weight:700;
    color:var(--coral);
    margin-top:10px;
    opacity:0;
    transition: opacity 0.25s ease;
  }
  .login-error.show{ opacity:1; }

  .app-wrap{ display:none; }
  .app-wrap.show{ display:block; }
</style>
</head>
<body>

<div class="login-card" id="loginCard">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 20 c-4-8 -16-4 -16 4 c0 7 8 12 16 20 c8-8 16-13 16-20 c0-8 -12-12 -16-4z" fill="#FF9EC4"/>
    <circle cx="50" cy="60" r="20" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
    <path d="M32 52 Q50 30 68 52 Q70 66 62 68 Q50 72 38 68 Q30 66 32 52 Z" fill="#C9AEEA" stroke="#6B4A5A" stroke-width="1.6"/>
    <circle cx="43" cy="61" r="2" fill="#6B4A5A"/>
    <circle cx="57" cy="61" r="2" fill="#6B4A5A"/>
    <ellipse cx="39" cy="66" rx="3" ry="1.8" fill="#FFB5D8" opacity="0.85"/>
    <ellipse cx="61" cy="66" rx="3" ry="1.8" fill="#FFB5D8" opacity="0.85"/>
    <path d="M44 69 Q50 72 56 69" stroke="#6B4A5A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  </svg>
  <p class="login-title">cuteky ✩</p>
  <p class="login-sub" id="loginSub"></p>

  <div class="field">
    <label for="emailInput">gmail</label>
    <input type="email" id="emailInput" placeholder="you@gmail.com" autocomplete="off">
  </div>
  <div class="field">
    <label for="passInput">password</label>
    <input type="password" id="passInput" placeholder="••••••••" autocomplete="off">
  </div>

  <button class="btn-login" onclick="tryLogin()">let me in ♡</button>
  <p class="login-error" id="loginError">nuh uh, try again love 🥺</p>
</div>

<div class="app-wrap" id="appWrap">
<div class="card">

  <!-- doll doodle watching the user -->
  <div class="doll-wrap">
    <svg viewBox="0 0 100 110" xmlns="http://www.w3.org/2000/svg">
      <!-- thought bubble -->
      <circle cx="14" cy="14" r="3" fill="#fff" stroke="#C9AEEA" stroke-width="1.4"/>
      <circle cx="21" cy="8" r="4.5" fill="#fff" stroke="#C9AEEA" stroke-width="1.4"/>
      <ellipse cx="46" cy="16" rx="42" ry="17" fill="#fff" stroke="#C9AEEA" stroke-width="1.6"/>
      <text x="46" y="12" text-anchor="middle" class="thought-text">Work hard,</text>
      <text x="46" y="21" text-anchor="middle" class="thought-text">take me with you 🧸</text>

      <!-- doll body -->
      <ellipse cx="50" cy="88" rx="24" ry="19" fill="#FFE9A8" stroke="#6B4A5A" stroke-width="2"/>
      <!-- doll head -->
      <circle cx="50" cy="62" r="22" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <!-- ears -->
      <circle cx="32" cy="46" r="8" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <circle cx="68" cy="46" r="8" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <circle cx="32" cy="46" r="3.4" fill="#FFB5D8"/>
      <circle cx="68" cy="46" r="3.4" fill="#FFB5D8"/>
      <!-- eyes looking left toward the timer -->
      <circle cx="43" cy="61" r="2.6" fill="#6B4A5A"/>
      <circle cx="55" cy="61" r="2.6" fill="#6B4A5A"/>
      <!-- blush -->
      <ellipse cx="38" cy="68" rx="4" ry="2.4" fill="#FFB5D8" opacity="0.8"/>
      <ellipse cx="62" cy="68" rx="4" ry="2.4" fill="#FFB5D8" opacity="0.8"/>
      <!-- mouth -->
      <path d="M46 71 Q50 74 54 71" stroke="#6B4A5A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <!-- little heart on tummy -->
      <path d="M50 84 c-2.5-3 -7-1.5-7 2 c0 3 4 5 7 7.5 c3-2.5 7-4.5 7-7.5 c0-3.5-4.5-5-7-2z" fill="#FF9EC4"/>
    </svg>
  </div>

  <h1 class="brand">cuteky ✩</h1>
  <p class="tagline">your tiny focus companion</p>

  <!-- couple doodle -->
  <div class="couple-wrap">
    <svg viewBox="0 0 170 90" xmlns="http://www.w3.org/2000/svg">
      <!-- heart above -->
      <path d="M85 18 c-3-6 -12-3.5 -12 2.5 c0 5 6 8.5 12 13.5 c6-5 12-8.5 12-13.5 c0-6 -9-8.5 -12-2.5z" fill="#FF9EC4"/>

      <!-- girl -->
      <circle cx="58" cy="52" r="16" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <path d="M44 46 Q58 26 72 46 Q73 60 66 62 Q58 66 50 62 Q43 60 44 46 Z" fill="#C9AEEA" stroke="#6B4A5A" stroke-width="1.6"/>
      <circle cx="53" cy="53" r="1.8" fill="#6B4A5A"/>
      <circle cx="63" cy="53" r="1.8" fill="#6B4A5A"/>
      <ellipse cx="50" cy="58" rx="3" ry="1.8" fill="#FFB5D8" opacity="0.8"/>
      <ellipse cx="66" cy="58" rx="3" ry="1.8" fill="#FFB5D8" opacity="0.8"/>
      <path d="M53 60 Q58 63 63 60" stroke="#6B4A5A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <path d="M58 66 L58 82 M58 72 L48 80 M58 72 L68 80" stroke="#6B4A5A" stroke-width="2.2" fill="none" stroke-linecap="round"/>

      <!-- boy -->
      <circle cx="112" cy="52" r="16" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <path d="M97 42 Q112 32 127 42 Q126 38 112 36 Q98 38 97 42 Z" fill="#8C6A4E" stroke="#6B4A5A" stroke-width="1.4"/>
      <circle cx="107" cy="53" r="1.8" fill="#6B4A5A"/>
      <circle cx="117" cy="53" r="1.8" fill="#6B4A5A"/>
      <ellipse cx="104" cy="58" rx="3" ry="1.8" fill="#9FD3FF" opacity="0.8"/>
      <ellipse cx="120" cy="58" rx="3" ry="1.8" fill="#9FD3FF" opacity="0.8"/>
      <path d="M107 60 Q112 63 117 60" stroke="#6B4A5A" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <path d="M112 66 L112 82 M112 72 L102 80 M112 72 L122 80" stroke="#6B4A5A" stroke-width="2.2" fill="none" stroke-linecap="round"/>

      <!-- holding hands -->
      <path d="M74 74 Q85 80 96 74" stroke="#6B4A5A" stroke-width="2.2" fill="none" stroke-linecap="round"/>

      <text x="85" y="88" text-anchor="middle" class="banner-text">we have to stay together</text>
    </svg>
  </div>

  <div class="timer-display" id="display">00:00:00</div>
  <div class="status-pill" id="statusPill">ready when you are</div>

  <div class="controls" id="controls">
    <button class="btn-start" id="startBtn" onclick="startTimer()">start ♡</button>
  </div>

  <div class="message-box" id="messageBox">
    <span id="messageMain"></span>
    <span class="sub" id="messageSub"></span>
  </div>

  <div class="footer-heart">made with lots of love 🩷</div>
</div>
</div>

<div class="overlay" id="pauseOverlay">
  <div class="popup">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- anger marks -->
      <path d="M70 14 L76 8 M74 18 L82 14" stroke="#F26C87" stroke-width="2.4" stroke-linecap="round"/>
      <!-- hair -->
      <path d="M28 40 Q50 12 72 40 Q74 58 68 60 Q50 66 32 60 Q26 58 28 40 Z" fill="#C9AEEA" stroke="#6B4A5A" stroke-width="2"/>
      <!-- face -->
      <circle cx="50" cy="48" r="22" fill="#FFEFD6" stroke="#6B4A5A" stroke-width="2"/>
      <!-- furrowed angry brows -->
      <path d="M36 40 L44 44" stroke="#6B4A5A" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M64 40 L56 44" stroke="#6B4A5A" stroke-width="2.4" stroke-linecap="round"/>
      <!-- eyes -->
      <circle cx="42" cy="49" r="2.4" fill="#6B4A5A"/>
      <circle cx="58" cy="49" r="2.4" fill="#6B4A5A"/>
      <!-- blush -->
      <ellipse cx="36" cy="55" rx="4" ry="2.4" fill="#FF9EC4" opacity="0.85"/>
      <ellipse cx="64" cy="55" rx="4" ry="2.4" fill="#FF9EC4" opacity="0.85"/>
      <!-- pouty angry mouth -->
      <path d="M42 60 Q50 55 58 60" stroke="#6B4A5A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- arms crossed -->
      <path d="M28 78 Q50 66 72 78" stroke="#6B4A5A" stroke-width="2.4" fill="none" stroke-linecap="round"/>
      <path d="M50 70 L50 82" stroke="#6B4A5A" stroke-width="2" stroke-linecap="round"/>
      <!-- body -->
      <ellipse cx="50" cy="86" rx="26" ry="12" fill="#FF9EC4" stroke="#6B4A5A" stroke-width="2"/>
    </svg>
    <p class="popup-title">hey!! 😤</p>
    <p class="popup-sub">come back fast and studyyy, i'm waiting for you</p>
    <button class="btn-popup" onclick="closePausePopup()">okay okay, resuming ♡</button>
  </div>
</div>

<script>
  let seconds = 0;
  let intervalId = null;
  let state = "idle"; // idle | running | paused | stopped

  const display = document.getElementById('display');
  const statusPill = document.getElementById('statusPill');
  const controls = document.getElementById('controls');
  const messageBox = document.getElementById('messageBox');
  const messageMain = document.getElementById('messageMain');
  const messageSub = document.getElementById('messageSub');

  function formatTime(totalSeconds){
    const h = String(Math.floor(totalSeconds/3600)).padStart(2,'0');
    const m = String(Math.floor((totalSeconds%3600)/60)).padStart(2,'0');
    const s = String(totalSeconds%60).padStart(2,'0');
    return h+":"+m+":"+s;
  }

  function tick(){
    seconds++;
    display.textContent = formatTime(seconds);
  }

  function renderControls(){
    if(state === "running"){
      controls.innerHTML = `
        <button class="btn-pause" onclick="pauseTimer()">pause ⏸</button>
        <button class="btn-stop" onclick="stopTimer()">stop ■</button>`;
      statusPill.textContent = "focusing rn 🌸";
    } else if(state === "paused"){
      controls.innerHTML = `
        <button class="btn-resume" onclick="resumeTimer()">resume ▶</button>
        <button class="btn-stop" onclick="stopTimer()">stop ■</button>`;
      statusPill.textContent = "taking a lil breather";
    } else if(state === "stopped"){
      controls.innerHTML = `
        <button class="btn-reset" onclick="resetTimer()">new session ✩</button>`;
      statusPill.textContent = "session complete";
    } else {
      controls.innerHTML = `<button class="btn-start" id="startBtn" onclick="startTimer()">start ♡</button>`;
      statusPill.textContent = "ready when you are";
    }
  }

  function startTimer(){
    state = "running";
    intervalId = setInterval(tick, 1000);
    messageBox.classList.remove('show');
    renderControls();
  }

  function pauseTimer(){
    state = "paused";
    clearInterval(intervalId);
    renderControls();
    showPausePopup();
  }

  function showPausePopup(){
    const overlay = document.getElementById('pauseOverlay');
    const svg = overlay.querySelector('svg');
    svg.style.animation = 'none';
    void svg.offsetWidth; // restart shake animation each time
    svg.style.animation = '';
    overlay.classList.add('show');
  }

  function closePausePopup(){
    document.getElementById('pauseOverlay').classList.remove('show');
    resumeTimer();
  }

  function resumeTimer(){
    state = "running";
    intervalId = setInterval(tick, 1000);
    renderControls();
  }

  function stopTimer(){
    state = "stopped";
    clearInterval(intervalId);
    document.getElementById('pauseOverlay').classList.remove('show');
    renderControls();
    showEndMessage();
  }

  function resetTimer(){
    seconds = 0;
    display.textContent = formatTime(seconds);
    state = "idle";
    messageBox.classList.remove('show');
    renderControls();
  }

  function showEndMessage(){
    const hours = seconds / 3600;
    if(hours < 8){
      messageMain.textContent = "come back fast! 🩷";
      messageSub.textContent = "you clocked " + formatTime(seconds) + " — cuteky missed you already";
    } else {
      messageMain.textContent = "so proud of you! 🌟";
      messageSub.textContent = "you showed up for " + formatTime(seconds) + " — go rest now, superstar";
    }
    requestAnimationFrame(()=> messageBox.classList.add('show'));
  }

  renderControls();

  // stashed away so a quick peek at the source doesn't give it away instantly
  const VALID_EMAIL = atob("amFuYUBnbWFpbC5jb20=");
  const VALID_PASS = atob("amFuYQ==");
  document.getElementById('loginSub').textContent = atob("anVzdCBmb3IgeW91LCBqYW5h") + " 🩷";

  function tryLogin(){
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const pass = document.getElementById('passInput').value;
    const loginCard = document.getElementById('loginCard');
    const loginError = document.getElementById('loginError');

    if(email === VALID_EMAIL && pass === VALID_PASS){
      loginError.classList.remove('show');
      loginCard.style.transition = "opacity 0.35s ease, transform 0.35s ease";
      loginCard.style.opacity = "0";
      loginCard.style.transform = "translateY(-8px) scale(0.96)";
      setTimeout(()=>{
        loginCard.style.display = "none";
        document.getElementById('appWrap').classList.add('show');
      }, 350);
    } else {
      loginError.classList.add('show');
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth;
      loginCard.classList.add('shake');
    }
  }

  document.getElementById('passInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') tryLogin();
  });
</script>

</body>
</html>
